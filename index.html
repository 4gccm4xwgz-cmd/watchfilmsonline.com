<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для тебя ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
    text-align: center;
    color: white;
}

/* вибрация */
body.shake {
    animation: shake 0.3s infinite;
}

@keyframes shake {
    0% { transform: translate(1px, 1px); }
    50% { transform: translate(-2px, 2px); }
    100% { transform: translate(1px, -1px); }
}

/* контейнер */
.container {
    margin-top: 40px;
}

/* фото */
.photo {
    width: 280px;
    border-radius: 20px;
    transition: all 1s ease;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* превращение в сердечко */
.photo.heart {
    clip-path: path("M140 250 L20 130 A70 70 0 0 1 140 60 A70 70 0 0 1 260 130 Z");
    transform: scale(1.1);
}

/* текст вопроса */
h1 {
    margin-top: 20px;
    font-size: 28px;
    padding: 0 15px;
    line-height: 1.4;
}

/* кнопки */
.buttons {
    margin-top: 30px;
    position: relative;
    height: 200px;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    position: absolute;
}

#yes {
    left: 40%;
    background: #ff4d6d;
    color: white;
}

#no {
    left: 55%;
    background: rgba(255,255,255,0.7);
}

/* экран любви */
.love-screen {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* печатающийся текст */
.love-text {
    font-size: 26px;
    max-width: 500px;
    padding: 20px;
    border-right: 2px solid white;
    white-space: pre-line;
    overflow: hidden;
}

/* сердечки */
.heart-fall {
    position: absolute;
    color: rgba(255,255,255,0.7);
    animation: fall linear infinite;
}

@keyframes fall {
    0% { transform: translateY(-10px); }
    100% { transform: translateY(100vh); }
}

/* 📱 АДАПТАЦИЯ ДЛЯ ТЕЛЕФОНОВ */
@media (max-width: 600px) {
    .photo {
        width: 90%;
    }

    h1 {
        font-size: 32px;
        padding: 0 15px;
        line-height: 1.4;
    }

    .love-text {
        font-size: 30px;
        max-width: 90%;
        line-height: 1.6;
    }

    button {
        font-size: 20px;
        padding: 14px 28px;
    }
}
</style>
</head>

<body>

<audio id="music" src="music.mp3"></audio>

<div class="container" id="main">
    <img src="your-photo.jpg" class="photo" id="photo">

    <h1>А красивая девочка Кира соскучилась по мне?</h1>

    <div class="buttons">
        <button id="yes">Да 💖</button>
        <button id="no">Нет 🙃</button>
    </div>
</div>

<div class="love-screen" id="love">
    <div class="love-text" id="text"></div>
</div>

<script>
const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const music = document.getElementById("music");
const textEl = document.getElementById("text");
const photo = document.getElementById("photo");

const message = `💕
Ты — моё счастье, моя радость и мой покой.

Я думаю о тебе каждый день и каждую ночь.

Спасибо, что ты есть в моей жизни ❤️

Я тебя ядерно взрыопасно люблю 💖`;

// убегающая кнопка
noBtn.addEventListener("mouseover", () => {
    noBtn.style.left = Math.random() * 80 + "%";
    noBtn.style.top = Math.random() * 150 + "px";
});

// печатающийся текст
function typeText(text, element, speed = 50) {
    let i = 0;
    function typing() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }
    typing();
}

// сердечки
function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart-fall";
    heart.innerText = "❤";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (10 + Math.random() * 20) + "px";
    heart.style.animationDuration = (3 + Math.random() * 5) + "s";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}

// переход
yesBtn.addEventListener("click", () => {
    photo.classList.add("heart");

    setTimeout(() => {
        document.getElementById("main").style.display = "none";
        document.getElementById("love").style.display = "flex";

        music.play();

        if (navigator.vibrate) {
            navigator.vibrate([200,100,200]);
        }

        typeText(message, textEl, 40);

    }, 1000);
});

setInterval(createHeart, 300);
</script>

</body>
</html>
